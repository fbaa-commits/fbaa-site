<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBAA — Favaro Barella Arquitetos Associados</title>
<meta name="description" content="Favaro Barella Arquitetos Associados. Arquitetura, interiores e urbanismo. Caxias do Sul, RS.">
<style>
@font-face {
  font-family: 'FuturaPT';
  src: url('./fonts/futura-pt_light-webfont.woff2') format('woff2'),
       url('./fonts/futura-pt_light-webfont.woff') format('woff');
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --white: #f5f4f0; --black: #0c0c0c; --gray: rgba(245,244,240,0.5); }
html, body { height: 100%; background: var(--black); color: var(--white); font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif; font-weight: 300; overflow: hidden; }
.hero { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
.hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 55%; filter: brightness(0.52); animation: slowzoom 20s ease-out forwards; }
@keyframes slowzoom { from { transform: scale(1.05); } to { transform: scale(1.00); } }
.overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(12,12,12,0.1) 0%, rgba(12,12,12,0.0) 35%, rgba(12,12,12,0.55) 100%); }
header { position: absolute; top: 0; left: 0; right: 0; padding: 2.4rem 3rem; display: flex; justify-content: space-between; align-items: flex-start; opacity: 0; animation: fadein 1.4s ease 0.3s forwards; }
.logo { display: block; width: auto; height: clamp(60px, 8vw, 100px); opacity: 0.92; }
nav { display: flex; gap: 2.8rem; align-items: center; padding-top: 0.4rem; }
nav a { font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif; font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gray); text-decoration: none; font-weight: 300; transition: color 0.4s; }
nav a:hover { color: var(--white); }
.bottom-left { position: absolute; bottom: 3.8rem; left: 3rem; opacity: 0; animation: slidein 1.4s ease 0.7s forwards; }
.eyebrow { font-size: 0.58rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gray); margin-bottom: 0.8rem; font-weight: 300; }
.project-name { font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif; font-size: clamp(1.8rem, 3.5vw, 3rem); font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; line-height: 1.15; color: var(--white); }
.project-location { font-size: 0.6rem; letter-spacing: 0.25em; color: var(--gray); margin-top: 0.7rem; text-transform: uppercase; font-weight: 300; }
.bottom-right { position: absolute; bottom: 3.8rem; right: 3rem; opacity: 0; animation: fadein 1.4s ease 1.1s forwards; }
.contact-link { font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif; display: inline-block; font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gray); text-decoration: none; font-weight: 300; border: 1px solid rgba(245,244,240,0.2); padding: 0.8rem 1.6rem; transition: all 0.4s; }
.contact-link:hover { color: var(--white); border-color: rgba(245,244,240,0.6); background: rgba(245,244,240,0.05); }
.divider { position: absolute; bottom: 0; left: 3rem; right: 3rem; height: 1px; background: rgba(245,244,240,0.1); opacity: 0; animation: fadein 1s ease 1.5s forwards; }
@media (max-width: 640px) { header { padding: 1.8rem 2rem; } nav { gap: 1.8rem; } .bottom-left { left: 2rem; bottom: 5rem; } .bottom-right { right: 2rem; bottom: 2rem; } .divider { left: 2rem; right: 2rem; } .project-name { font-size: 1.6rem; } .logo { height: 50px; } }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes slidein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<section class="hero">
  <img class="hero-img" src="./images/hero.jpg" alt="Casa Grewe Vendruscolo — FBAA Arquitetos">
  <div class="overlay"></div>
  <header>
    <img class="logo" src="./images/logo.png" alt="Favaro Barella Arquitetos Associados">
    <nav>
      <a href="#">Projetos</a>
      <a href="#">Escritório</a>
      <a href="mailto:contato@fbaa.com.br">Contato</a>
    </nav>
  </header>
  <div class="bottom-left">
    <p class="eyebrow">Projeto em destaque</p>
    <h1 class="project-name">Casa Grewe<br>Vendruscolo</h1>
    <p class="project-location">Bento Gonçalves &nbsp;·&nbsp; RS &nbsp;·&nbsp; 2024</p>
  </div>
  <div class="bottom-right">
    <a class="contact-link" href="mailto:contato@fbaa.com.br">contato@fbaa.com.br</a>
  </div>
  <div class="divider"></div>
</section>
</body>
</html>
