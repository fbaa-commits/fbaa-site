<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBAA — Favaro Barella Arquitetos Associados</title>
<meta name="description" content="Favaro Barella Arquitetos Associados. Arquitetura, interiores e urbanismo. Caxias do Sul, RS.">
<style>
@font-face {
  font-family: 'FuturaPT';
  src: url('./fonts/futura-pt_light-webfont.woff2') format('woff2'),
       url('./fonts/futura-pt_light-webfont.woff') format('woff');
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #0c0c0c; overflow: hidden; }
.hero { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
.hero-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 30%;
  filter: brightness(0.7);
  animation: slowzoom 20s ease-out forwards;
}
@keyframes slowzoom { from { transform: scale(1.05); } to { transform: scale(1.00); } }
.overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom,
    rgba(12,12,12,0.5) 0%,
    rgba(12,12,12,0.0) 22%,
    rgba(12,12,12,0.0) 55%,
    rgba(12,12,12,0.8) 100%);
}
header {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 3.5rem 4rem;
  opacity: 0;
  animation: fadein 1.4s ease 0.3s forwards;
}
.logo { display: block; width: auto; height: clamp(90px, 12vw, 155px); }
.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 2.5rem 4rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  opacity: 0;
  animation: fadein 1.4s ease 1s forwards;
}
.under-construction { display: flex; align-items: center; gap: 1rem; }
.uc-line { display: block; width: 28px; height: 1px; background: rgba(245,244,240,0.6); flex-shrink: 0; }
.uc-label {
  font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif;
  font-size: 0.62rem; letter-spacing: 0.35em; text-transform: uppercase;
  color: #f5f4f0; font-weight: 300;
  text-shadow: 0 1px 8px rgba(0,0,0,0.9);
  white-space: nowrap;
}
.contact-link {
  font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif;
  display: inline-block; font-size: 0.62rem; letter-spacing: 0.28em;
  text-transform: uppercase; color: #f5f4f0; text-decoration: none;
  font-weight: 300; border: 1px solid rgba(245,244,240,0.55);
  padding: 0.8rem 1.6rem; text-shadow: 0 1px 6px rgba(0,0,0,0.7);
  transition: all 0.4s; backdrop-filter: blur(4px);
  background: rgba(0,0,0,0.2); white-space: nowrap;
}
.contact-link:hover { color: #fff; border-color: rgba(245,244,240,0.9); background: rgba(0,0,0,0.35); }
@media (max-width: 640px) {
  .hero-img { object-position: 60% 30%; }
  header { padding: 2.8rem 2.4rem; }
  .logo { height: 88px; }
  .bottom-bar {
    padding: 1.8rem 2.4rem 3rem;
    flex-direction: column; align-items: flex-start; gap: 1.4rem;
  }
  .uc-label { font-size: 0.58rem; letter-spacing: 0.3em; }
  .contact-link { font-size: 0.58rem; letter-spacing: 0.22em; padding: 0.9rem 1.4rem; width: 100%; text-align: center; }
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<section class="hero">
  <img class="hero-img" src="./images/hero.jpg" alt="FBAA — Favaro Barella Arquitetos Associados">
  <div class="overlay"></div>
  <header>
    <img class="logo" src="./images/logo.png" alt="Favaro Barella Arquitetos Associados">
  </header>
  <div class="bottom-bar">
    <div class="under-construction">
      <span class="uc-line"></span>
      <span class="uc-label">Site em construção</span>
    </div>
    <a class="contact-link" href="mailto:contato@fbaa.com.br">contato@fbaa.com.br</a>
  </div>
</section>
</body>
</html>
