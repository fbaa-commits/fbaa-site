<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBAA — Favaro Barella Arquitetos Associados</title>
<meta name="description" content="Favaro Barella Arquitetos Associados. Arquitetura, interiores e urbanismo. Caxias do Sul, RS.">
<style>
@font-face {
  font-family: 'FuturaPT';
  src: url('./fonts/futura-pt_light-webfont.woff2') format('woff2'),
       url('./fonts/futura-pt_light-webfont.woff') format('woff');
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --white: #f5f4f0; --black: #0c0c0c; --gray: rgba(245,244,240,0.45); }
html, body { height: 100%; background: var(--black); color: var(--white); font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif; font-weight: 300; overflow: hidden; }
.hero { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
.hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 40%; filter: brightness(0.72); animation: slowzoom 20s ease-out forwards; }
@keyframes slowzoom { from { transform: scale(1.05); } to { transform: scale(1.00); } }
.overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(12,12,12,0.08) 0%, rgba(12,12,12,0.0) 30%, rgba(12,12,12,0.38) 100%); }
header { position: absolute; top: 0; left: 0; right: 0; padding: 3rem 3.5rem; display: flex; justify-content: space-between; align-items: flex-start; opacity: 0; animation: fadein 1.4s ease 0.3s forwards; }
.logo { display: block; width: auto; height: clamp(80px, 11vw, 140px); opacity: 0.95; }
.under-construction { position: absolute; bottom: 3.5rem; left: 50%; transform: translateX(-50%); opacity: 0; animation: fadein 1.4s ease 1.2s forwards; text-align: center; }
.under-construction p { font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif; font-size: 0.58rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gray); font-weight: 300; }
.under-construction .line { display: block; width: 40px; height: 1px; background: rgba(245,244,240,0.2); margin: 0.8rem auto; }
.contact-bottom { position: absolute; bottom: 3.5rem; right: 3.5rem; opacity: 0; animation: fadein 1.4s ease 1.1s forwards; }
.contact-link { font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif; display: inline-block; font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gray); text-decoration: none; font-weight: 300; border: 1px solid rgba(245,244,240,0.18); padding: 0.8rem 1.6rem; transition: all 0.4s; }
.contact-link:hover { color: var(--white); border-color: rgba(245,244,240,0.55); background: rgba(245,244,240,0.05); }
.divider { position: absolute; bottom: 0; left: 3.5rem; right: 3.5rem; height: 1px; background: rgba(245,244,240,0.08); opacity: 0; animation: fadein 1s ease 1.5s forwards; }
@media (max-width: 640px) { header { padding: 2rem 2rem; } .logo { height: 65px; } .under-construction { bottom: 5rem; } .contact-bottom { right: 2rem; bottom: 2rem; } .divider { left: 2rem; right: 2rem; } }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<section class="hero">
  <img class="hero-img" src="./images/hero.jpg" alt="FBAA — Favaro Barella Arquitetos Associados">
  <div class="overlay"></div>
  <header>
    <img class="logo" src="./images/logo.png" alt="Favaro Barella Arquitetos Associados">
  </header>
  <div class="under-construction">
    <span class="line"></span>
    <p>Site em construção</p>
    <span class="line"></span>
  </div>
  <div class="contact-bottom">
    <a class="contact-link" href="mailto:contato@fbaa.com.br">contato@fbaa.com.br</a>
  </div>
  <div class="divider"></div>
</section>
</body>
</html>
