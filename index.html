<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBAA — Favaro Barella Arquitetos Associados</title>
<meta name="description" content="Favaro Barella Arquitetos Associados. Arquitetura, interiores e urbanismo. Caxias do Sul, RS.">
<style>
@font-face {
  font-family: 'FuturaPT';
  src: url('./fonts/futura-pt_light-webfont.woff2') format('woff2'),
       url('./fonts/futura-pt_light-webfont.woff') format('woff');
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #0c0c0c; overflow: hidden; }

.hero { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

.hero-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 40%;
  filter: brightness(0.72);
  animation: slowzoom 20s ease-out forwards;
}
@keyframes slowzoom { from { transform: scale(1.05); } to { transform: scale(1.00); } }

/* gradient escurece apenas o fundo onde está o texto */
.overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(12,12,12,0.35) 0%,
    rgba(12,12,12,0.0) 25%,
    rgba(12,12,12,0.0) 65%,
    rgba(12,12,12,0.6) 100%
  );
}

header {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 3.5rem 4rem;
  opacity: 0;
  animation: fadein 1.4s ease 0.3s forwards;
}
.logo {
  display: block; width: auto;
  height: clamp(90px, 12vw, 155px);
}

/* SITE EM CONSTRUÇÃO — centrado, sobre faixa escura na base */
.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 2rem 4rem 2.5rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  opacity: 0;
  animation: fadein 1.4s ease 1s forwards;
}

.under-construction {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.5rem;
}
.uc-label {
  font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: rgba(245,244,240,0.9);
  font-weight: 300;
}
.uc-line {
  display: block;
  width: 32px; height: 1px;
  background: rgba(245,244,240,0.4);
}

.contact-link {
  font-family: 'FuturaPT', 'Futura', 'Century Gothic', sans-serif;
  display: inline-block;
  font-size: 0.6rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(245,244,240,0.9);
  text-decoration: none;
  font-weight: 300;
  border: 1px solid rgba(245,244,240,0.35);
  padding: 0.75rem 1.5rem;
  transition: all 0.4s;
}
.contact-link:hover {
  color: #fff;
  border-color: rgba(245,244,240,0.8);
  background: rgba(245,244,240,0.08);
}

@media (max-width: 640px) {
  header { padding: 2.5rem 2.5rem; }
  .logo { height: 72px; }
  .bottom-bar { padding: 1.5rem 2.5rem 2rem; flex-direction: column; align-items: flex-start; gap: 1.2rem; }
}

@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<section class="hero">
  <img class="hero-img" src="./images/hero.jpg" alt="FBAA — Favaro Barella Arquitetos Associados">
  <div class="overlay"></div>

  <header>
    <img class="logo" src="./images/logo.png" alt="Favaro Barella Arquitetos Associados">
  </header>

  <div class="bottom-bar">
    <div class="under-construction">
      <span class="uc-line"></span>
      <span class="uc-label">Site em construção</span>
    </div>
    <a class="contact-link" href="mailto:contato@fbaa.com.br">contato@fbaa.com.br</a>
  </div>
</section>
</body>
</html>
